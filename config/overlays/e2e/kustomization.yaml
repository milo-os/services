namespace: services-system

resources:
  - namespace.yaml
  - ../../base/crd
  - ../../base/manager
  - ../../base/certmanager


components:
  - ../../base/webhook
  - ../../components/controller_rbac

images:
  - name: ghcr.io/milo-os/service-catalog
    newTag: dev

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/args
        value:
          - --health-probe-bind-address=:8081
          - --server-config=/config/config.yaml
    target:
      kind: Deployment
      name: services-controller-manager

replacements:
  - source:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: services-serving-cert
      fieldPath: .metadata.namespace
    targets:
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 0
          create: true
      - select:
          kind: MutatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 0
          create: true
  - source:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: services-serving-cert
      fieldPath: .metadata.name
    targets:
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 1
          create: true
      - select:
          kind: MutatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 1
          create: true

transformers:
  - cert_dnsnames_patch.yaml
