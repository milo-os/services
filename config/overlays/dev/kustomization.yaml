namespace: services-system

images:
  - name: ghcr.io/milo-os/services
    newTag: dev
  - name: ghcr.io/milo-os/services-ui
    newTag: dev

resources:
  - ../../base/crd
  - ../../base/manager
  - ../../base/certmanager

components:
  - ../../base/webhook
  - ../../components/ui

replacements:
  - source:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: services-serving-cert
      fieldPath: .metadata.namespace
    targets:
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 0
          create: true
      - select:
          kind: MutatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 0
          create: true
  - source:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: services-serving-cert
      fieldPath: .metadata.name
    targets:
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 1
          create: true
      - select:
          kind: MutatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 1
          create: true

transformers:
  - webhook_patch.yaml
