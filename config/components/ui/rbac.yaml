---
# ServiceAccount for the Services UI
apiVersion: v1
kind: ServiceAccount
metadata:
  name: services-ui
  namespace: services-system
---
# ClusterRole granting read access to Services resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: services-ui-reader
rules:
  - apiGroups: ["services.miloapis.com"]
    resources: ["services", "serviceconfigurations"]
    verbs: ["get", "list", "watch"]
---
# Bind the ClusterRole to the UI ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: services-ui-reader
subjects:
  - kind: ServiceAccount
    name: services-ui
    namespace: services-system
roleRef:
  kind: ClusterRole
  name: services-ui-reader
  apiGroup: rbac.authorization.k8s.io
