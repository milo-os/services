version: '3'

vars:
  TOOL_DIR: "{{.USER_WORKING_DIR}}/bin"
  SERVICES_IMAGE_NAME: "ghcr.io/milo-os/services"
  SERVICES_IMAGE_TAG: "dev"
  TEST_INFRA_CLUSTER_NAME: "test-infra"
  TEST_INFRA_REPO_REF: 'v0.6.0'
  CONTROLLER_TOOLS_VERSION: "v0.16.4"
  DEFAULTER_GEN_VERSION: "v0.32.3"
  GOLANGCI_LINT_VERSION: "v2.1.5"

includes:
  # Must set TASK_X_REMOTE_TASKFILES=1 to use this feature.
  test-infra:
    taskfile: https://raw.githubusercontent.com/datum-cloud/test-infra/{{.TEST_INFRA_REPO_REF}}/Taskfile.yml
    vars:
      REPO_REF: "{{.TEST_INFRA_REPO_REF}}"

  ui:
    taskfile: ./ui/Taskfile.yaml
    dir: ./ui

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  # Code generation
  generate:
    desc: Run code generation (deepcopy, defaults)
    cmds:
      - |
        set -e
        echo "Running code generation..."
        {{.TOOL_DIR}}/controller-gen object:headerFile="hack/boilerplate.go.txt" paths="./..."
        {{.TOOL_DIR}}/defaulter-gen ./internal/config --output-file=zz_generated.defaults.go
        echo "Code generation complete!"
    deps:
      - install-tools
    silent: true

  manifests:
    desc: Generate CRD, RBAC, and webhook manifests
    cmds:
      - |
        set -e
        echo "Generating manifests..."
        {{.TOOL_DIR}}/controller-gen rbac:roleName=services-controller-manager \
          crd:generateEmbeddedObjectMeta=true \
          webhook \
          paths="./..." \
          output:crd:artifacts:config=config/base/crd/bases \
          output:rbac:artifacts:config=config/components/controller_rbac \
          output:webhook:artifacts:config=config/base/webhook
        echo "Manifests generated!"
    deps:
      - install-tools
    silent: true

  build:
    desc: Build the services binary
    cmds:
      - |
        set -e
        echo "Building services..."
        mkdir -p {{.TOOL_DIR}}

        GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
        VERSION="v0.0.0-dev+${GIT_COMMIT:0:7}"
        GIT_TREE_STATE="clean"
        if [ -n "$(git status --porcelain 2>/dev/null)" ]; then
          GIT_TREE_STATE="dirty"
        fi
        BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || echo "unknown")

        echo "Version: ${VERSION}, Commit: ${GIT_COMMIT:0:7}, Tree: ${GIT_TREE_STATE}"

        go build \
          -ldflags="-X 'main.version=${VERSION}' \
                    -X 'main.gitCommit=${GIT_COMMIT}' \
                    -X 'main.gitTreeState=${GIT_TREE_STATE}' \
                    -X 'main.buildDate=${BUILD_DATE}'" \
          -o {{.TOOL_DIR}}/services ./cmd/services
        echo "Binary built: {{.TOOL_DIR}}/services"
    silent: true

  test:
    desc: Run Go tests
    cmds:
      - go test -timeout 5m ./... -count=1
    silent: false

  lint:
    desc: Run golangci-lint
    cmds:
      - "{{.TOOL_DIR}}/golangci-lint run ./..."
    deps:
      - install-tools
    silent: false

  # Tool installation
  install-tools:
    desc: Install required development tools
    cmds:
      - |
        set -e
        mkdir -p {{.TOOL_DIR}}

        # controller-gen
        if [ ! -f "{{.TOOL_DIR}}/controller-gen-{{.CONTROLLER_TOOLS_VERSION}}" ]; then
          echo "Installing controller-gen {{.CONTROLLER_TOOLS_VERSION}}..."
          GOBIN={{.TOOL_DIR}} go install sigs.k8s.io/controller-tools/cmd/controller-gen@{{.CONTROLLER_TOOLS_VERSION}}
          mv {{.TOOL_DIR}}/controller-gen {{.TOOL_DIR}}/controller-gen-{{.CONTROLLER_TOOLS_VERSION}}
        fi
        ln -sf {{.TOOL_DIR}}/controller-gen-{{.CONTROLLER_TOOLS_VERSION}} {{.TOOL_DIR}}/controller-gen

        # defaulter-gen
        if [ ! -f "{{.TOOL_DIR}}/defaulter-gen-{{.DEFAULTER_GEN_VERSION}}" ]; then
          echo "Installing defaulter-gen {{.DEFAULTER_GEN_VERSION}}..."
          GOBIN={{.TOOL_DIR}} go install k8s.io/code-generator/cmd/defaulter-gen@{{.DEFAULTER_GEN_VERSION}}
          mv {{.TOOL_DIR}}/defaulter-gen {{.TOOL_DIR}}/defaulter-gen-{{.DEFAULTER_GEN_VERSION}}
        fi
        ln -sf {{.TOOL_DIR}}/defaulter-gen-{{.DEFAULTER_GEN_VERSION}} {{.TOOL_DIR}}/defaulter-gen

        # golangci-lint
        if [ ! -f "{{.TOOL_DIR}}/golangci-lint-{{.GOLANGCI_LINT_VERSION}}" ]; then
          echo "Installing golangci-lint {{.GOLANGCI_LINT_VERSION}}..."
          GOBIN={{.TOOL_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
          mv {{.TOOL_DIR}}/golangci-lint {{.TOOL_DIR}}/golangci-lint-{{.GOLANGCI_LINT_VERSION}}
        fi
        ln -sf {{.TOOL_DIR}}/golangci-lint-{{.GOLANGCI_LINT_VERSION}} {{.TOOL_DIR}}/golangci-lint
    silent: true
    status:
      - test -f {{.TOOL_DIR}}/controller-gen-{{.CONTROLLER_TOOLS_VERSION}}
      - test -f {{.TOOL_DIR}}/defaulter-gen-{{.DEFAULTER_GEN_VERSION}}
      - test -f {{.TOOL_DIR}}/golangci-lint-{{.GOLANGCI_LINT_VERSION}}

  # Development tasks
  dev:build:
    desc: Build the services container image for development
    silent: true
    cmds:
      - |
        set -e
        echo "Building services container image: {{.SERVICES_IMAGE_NAME}}:{{.SERVICES_IMAGE_TAG}}"

        GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
        VERSION="v0.0.0-dev+${GIT_COMMIT:0:7}"
        GIT_TREE_STATE="clean"
        if [ -n "$(git status --porcelain 2>/dev/null)" ]; then
          GIT_TREE_STATE="dirty"
        fi
        BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || echo "unknown")

        docker build \
          --build-arg VERSION="${VERSION}" \
          --build-arg GIT_COMMIT="${GIT_COMMIT}" \
          --build-arg GIT_TREE_STATE="${GIT_TREE_STATE}" \
          --build-arg BUILD_DATE="${BUILD_DATE}" \
          -t "{{.SERVICES_IMAGE_NAME}}:{{.SERVICES_IMAGE_TAG}}" .
        echo "Successfully built {{.SERVICES_IMAGE_NAME}}:{{.SERVICES_IMAGE_TAG}}"

  dev:load:
    desc: Load the services container image into the kind cluster
    silent: true
    cmds:
      - |
        set -e
        echo "Loading image {{.SERVICES_IMAGE_NAME}}:{{.SERVICES_IMAGE_TAG}} into kind cluster '{{.TEST_INFRA_CLUSTER_NAME}}'..."
        kind load docker-image "{{.SERVICES_IMAGE_NAME}}:{{.SERVICES_IMAGE_TAG}}" --name "{{.TEST_INFRA_CLUSTER_NAME}}"
        echo "Successfully loaded image into kind cluster"

  dev:setup:
    desc: Setup lightweight dev environment
    silent: true
    cmds:
      - task: test-infra:cluster-up
      - task: dev:build
      - task: dev:load
      - task: dev:deploy

  dev:deploy:
    desc: Deploy services using dev overlay
    silent: true
    cmds:
      - |
        set -e
        echo "Deploying services (dev overlay)..."
        task test-infra:kubectl -- apply -k config/overlays/dev

        echo "Waiting for services controller..."
        task test-infra:kubectl -- wait --for=condition=ready pod -l app=services -n services-system --timeout=120s || echo "Services pods not ready yet"

        echo ""
        echo "Services deployed (dev overlay)!"

  dev:redeploy:
    desc: Quick rebuild and redeploy for dev environment
    deps:
      - dev:build
      - dev:load
    cmds:
      - |
        set -e
        echo "Redeploying services (dev)..."
        task test-infra:kubectl -- rollout restart -n services-system deployment/services || echo "Deployment not found, run 'task dev:deploy' first"

        echo "Waiting for rollout..."
        task test-infra:kubectl -- rollout status -n services-system deployment/services --timeout=120s || true
        echo "Redeployment complete!"
    silent: true

  # E2E Testing
  e2e:
    desc: Run chainsaw e2e tests
    cmds:
      - chainsaw test --config test/e2e/.chainsaw.yaml test/e2e/
    silent: false

  ui:docker-build:
    desc: Build the services UI Docker image
    silent: true
    cmds:
      - |
        echo "Building services UI image: ghcr.io/milo-os/services-ui:dev"
        docker build -t ghcr.io/milo-os/services-ui:dev ./ui
        echo "Successfully built services UI image"

  ui:kind-load:
    desc: Load the services UI image into kind cluster
    silent: true
    cmds:
      - |
        echo "Loading ghcr.io/milo-os/services-ui:dev into kind cluster '{{.TEST_INFRA_CLUSTER_NAME}}'..."
        kind load docker-image ghcr.io/milo-os/services-ui:dev --name "{{.TEST_INFRA_CLUSTER_NAME}}"
        echo "Successfully loaded UI image"

  ui:deploy:
    desc: Build UI image, load into kind, and deploy via kustomize
    deps:
      - ui:docker-build
      - ui:kind-load
    cmds:
      - |
        echo "Deploying services with UI overlay..."
        task test-infra:kubectl -- apply -k config/overlays/dev
        echo "Deployment applied!"

  ui:redeploy:
    desc: Quick rebuild and redeploy for the services-ui dev environment
    deps:
      - ui:docker-build
      - ui:kind-load
    cmds:
      - |
        set -e
        echo "Redeploying services-ui (dev)..."

        # Ensure imagePullPolicy is IfNotPresent so the freshly kind-loaded
        # image is used instead of pulling from ghcr.io.
        task test-infra:kubectl -- patch deployment services-ui -n services-system \
          --type=strategic \
          -p '{"spec":{"template":{"spec":{"containers":[{"name":"ui","imagePullPolicy":"IfNotPresent"}]}}}}' \
          || echo "Deployment not found, run 'task ui:deploy' first"

        # Restart pods so they pick up the freshly loaded image.
        task test-infra:kubectl -- rollout restart -n services-system deployment/services-ui \
          || echo "Deployment not found, run 'task ui:deploy' first"

        echo "Waiting for rollout..."
        task test-infra:kubectl -- rollout status -n services-system deployment/services-ui --timeout=120s || true

        # Restart the port-forward on 3001:3000. pkill is best-effort —
        # missing matches return non-zero, which we ignore.
        echo "Restarting port-forward 3001 -> services-ui:3000..."
        pkill -f "kubectl.*port-forward.*services-ui.*3001:3000" 2>/dev/null || true
        sleep 1
        nohup task test-infra:kubectl -- port-forward -n services-system svc/services-ui 3001:3000 \
          > /tmp/services-ui-port-forward.log 2>&1 &
        disown || true
        echo "Port-forward backgrounded (logs: /tmp/services-ui-port-forward.log)"

        echo "Redeployment complete! UI available at http://localhost:3001"
    silent: true
